<path d="M255,105 C255,68 295,48 325,56 C358,64 378,90 372,118 C367,140 348,153 328,155 C348,155 378,168 378,200 C378,238 352,262 318,264 C284,266 252,244 248,218" fill="none" stroke="#e5e7eb" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(229, 231, 235);color:rgb(0, 0, 0);stroke-width:28px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
