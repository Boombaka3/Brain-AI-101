<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 440"
  role="img"
  aria-labelledby="d3-neuron-title d3-neuron-desc"
>
  <title id="d3-neuron-title">Procedural neuron diagram</title>
  <desc id="d3-neuron-desc">
    A clean classroom-friendly neuron diagram generated from node geometry using D3 shape utilities.
  </desc>

  <defs>
    <clipPath id="somaClip">
      <path d="M372,111C393.767,111.115,423.681,122.472,438,138C451.786,152.949,460.779,179.479,458,201C454.694,226.596,432.436,266.547,408,280C382.476,294.052,331.524,294.052,306,280C281.564,266.547,254.527,225.558,256,201C257.395,177.741,288.335,151.138,309,136C327.577,122.391,350.779,110.888,372,111" />
    </clipPath>

    <filter id="signalGlow" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="sourceGlow" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="somaBodyGradient" x1="255" y1="111" x2="460" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#edf4fb" />
    </linearGradient>

    <linearGradient id="somaFillGradient" x1="375" y1="132" x2="375" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c9e2c5" />
      <stop offset="100%" stop-color="#b8d6b6" />
    </linearGradient>

    <style>
      :root {
        --neuron-stroke: #5f789c;
        --neuron-stroke-light: #dce6f2;
        --neuron-soma: #f4f7fb;
        --neuron-fill: #b8d6b6;
        --neuron-threshold: #f0a533;
        --neuron-signal: #1f86f2;
        --neuron-bg: #ffffff;
      }

      .neuron-outline {
        fill: none;
        stroke: var(--neuron-stroke);
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }
    </style>
  </defs>

  <rect width="900" height="440" rx="28" fill="var(--neuron-bg)" />

